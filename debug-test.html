<!DOCTYPE html>
<html>

<head>
    <title>Debug Photo Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
        }

        .btn {
            padding: 8px 16px;
            margin: 5px;
            border: none;
            cursor: pointer;
            background: #007bff;
            color: white;
        }

        .log {
            background: #f8f9fa;
            padding: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <h1>Debug Photo Test</h1>

    <div class="section">
        <h3>Step 1: Get Admin</h3>
        <input type="text" id="adminId" placeholder="Admin ID">
        <button class="btn" onclick="getAdmin()">Get Admin</button>
        <div id="adminLog" class="log"></div>
    </div>

    <div class="section">
        <h3>Step 2: Upload Photo</h3>
        <input type="file" id="photoFile" accept="image/*">
        <button class="btn" onclick="uploadDirect()">Upload Direct Test</button>
        <div id="uploadLog" class="log"></div>
    </div>

    <div class="section">
        <h3>Step 3: Check Photo</h3>
        <button class="btn" onclick="checkPhoto()">Check Photo</button>
        <div id="photoLog" class="log"></div>
        <img id="photoImg" style="width:100px;height:100px;display:none;">
    </div>

    <script>
        const API = 'http://localhost:8080/api/admins';
        let adminId = null;

        function log(id, msg) {
            document.getElementById(id).textContent += new Date().toLocaleTimeString() + ': ' + msg + '\n';
        }

        async function getAdmin() {
            adminId = document.getElementById('adminId').value;
            document.getElementById('adminLog').textContent = '';

            try {
                const res = await fetch(`${API}/${adminId}`);
                const admin = await res.json();
                log('adminLog', `Found: ${admin.username}`);
                log('adminLog', `Has photo: ${admin.profilePhoto ? 'YES' : 'NO'}`);
                if (admin.profilePhoto) {
                    log('adminLog', `Photo length: ${admin.profilePhoto.length}`);
                }
            } catch (e) {
                log('adminLog', `Error: ${e.message}`);
            }
        }

        async function uploadDirect() {
            if (!adminId) { log('uploadLog', 'Get admin first'); return; }

            const file = document.getElementById('photoFile').files[0];
            if (!file) { log('uploadLog', 'Select file first'); return; }

            document.getElementById('uploadLog').textContent = '';

            try {
                const formData = new FormData();
                formData.append('photo', file);

                log('uploadLog', `Uploading ${file.name}...`);
                const res = await fetch(`${API}/${adminId}/test-direct-photo`, {
                    method: 'POST',
                    body: formData
                });

                const result = await res.json();
                if (res.ok) {
                    log('uploadLog', 'SUCCESS!');
                    log('uploadLog', `Lengths: ${result.photoLength} -> ${result.savedPhotoLength} -> ${result.verifiedPhotoLength}`);
                } else {
                    log('uploadLog', `Error: ${result.error}`);
                }
            } catch (e) {
                log('uploadLog', `Error: ${e.message}`);
            }
        }

        async function checkPhoto() {
            if (!adminId) { log('photoLog', 'Get admin first'); return; }

            document.getElementById('photoLog').textContent = '';

            try {
                const res = await fetch(`${API}/${adminId}`);
                const admin = await res.json();

                if (admin.profilePhoto) {
                    log('photoLog', 'Photo found in database!');
                    log('photoLog', `Length: ${admin.profilePhoto.length}`);

                    const img = document.getElementById('photoImg');
                    img.src = admin.profilePhoto;
                    img.style.display = 'block';
                    log('photoLog', 'Photo displayed');
                } else {
                    log('photoLog', 'No photo in database');
                    document.getElementById('photoImg').style.display = 'none';
                }
            } catch (e) {
                log('photoLog', `Error: ${e.message}`);
            }
        }
    </script>
</body>

</html>
