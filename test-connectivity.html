<!DOCTYPE html>
<html>

<head>
    <title>Backend Connectivity Test</title>
</head>

<body>
    <h1>Backend Connectivity Test</h1>
    <div id="results"></div>

    <script>
        async function testConnectivity() {
            const results = document.getElementById('results');
            results.innerHTML = '<p>Testing backend connectivity...</p>';

            try {
                // Test 1: Basic connectivity
                console.log('Testing basic connectivity...');
                const response = await fetch('http://localhost:8081/api/test/credentials', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);

                if (response.ok) {
                    const data = await response.json();
                    console.log('Success response:', data);
                    results.innerHTML += '<p style="color: green;">✓ Backend is accessible</p>';

                    // Test 2: Create test member
                    console.log('Creating test member...');
                    const createResponse = await fetch('http://localhost:8081/api/test/create-test-member', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                    });

                    if (createResponse.ok) {
                        const createData = await createResponse.json();
                        console.log('Test member response:', createData);
                        results.innerHTML += '<p style="color: green;">✓ Test member created/exists</p>';

                        // Test 3: Authentication
                        console.log('Testing authentication...');
                        const authResponse = await fetch('http://localhost:8081/api/members/authenticate', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                username: 'testmember',
                                password: 'password123'
                            }),
                        });

                        console.log('Auth response status:', authResponse.status);

                        if (authResponse.ok) {
                            const authData = await authResponse.json();
                            console.log('Auth success:', authData);
                            results.innerHTML += '<p style="color: green;">✓ Authentication works!</p>';
                            results.innerHTML += '<p>Member ID: ' + authData.id + '</p>';
                        } else {
                            const authError = await authResponse.json();
                            console.log('Auth error:', authError);
                            results.innerHTML += '<p style="color: red;">✗ Authentication failed: ' + authError.error + '</p>';
                        }
                    } else {
                        const createError = await createResponse.json();
                        console.log('Create member error:', createError);
                        results.innerHTML += '<p style="color: red;">✗ Failed to create test member: ' + createError.error + '</p>';
                    }
                } else {
                    const errorData = await response.json();
                    console.log('Error response:', errorData);
                    results.innerHTML += '<p style="color: red;">✗ Backend not accessible: ' + response.status + '</p>';
                }
            } catch (error) {
                console.error('Connectivity test failed:', error);
                results.innerHTML += '<p style="color: red;">✗ Connection failed: ' + error.message + '</p>';
                results.innerHTML += '<p>Make sure the backend is running on http://localhost:8081</p>';
            }
        }

        // Run test when page loads
        testConnectivity();
    </script>
</body>

</html>
