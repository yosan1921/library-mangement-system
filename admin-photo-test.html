<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile Photo - Base64 Storage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        .photo-container {
            text-align: center;
            margin: 20px 0;
        }

        .profile-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ddd;
        }

        .upload-form {
            margin: 20px 0;
        }

        .btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
        }

        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .admin-info {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <h1>Admin Profile Photo Management</h1>
    <p><strong>Storage Method:</strong> Base64 in MongoDB Database</p>

    <div class="admin-info">
        <h3>Admin Information</h3>
        <p><strong>Admin ID:</strong> <input type="text" id="adminIdInput" placeholder="Enter admin ID" value=""></p>
        <button class="btn btn-primary" onclick="loadAdminInfo()">Load Admin</button>
        <div id="adminDetails"></div>
    </div>

    <div class="photo-container">
        <img id="profilePhoto" class="profile-photo" src="https://via.placeholder.com/150" alt="Profile Photo">
    </div>

    <div class="upload-form">
        <input type="file" id="photoInput" accept="image/*" style="margin-bottom: 10px;">
        <br>
        <button class="btn btn-primary" onclick="uploadPhoto()">Upload Photo</button>
        <button class="btn btn-danger" onclick="deletePhoto()">Delete Photo</button>
        <button class="btn" onclick="loadProfilePhoto()">Refresh Photo</button>
    </div>

    <div id="message"></div>

    <script>
        const API_BASE = 'http://localhost:8080/api/admins';
        let currentAdminId = null;

        function loadAdminInfo() {
            const adminId = document.getElementById('adminIdInput').value.trim();
            if (!adminId) {
                showMessage('Please enter an admin ID', 'error');
                return;
            }

            currentAdminId = adminId;

            // Load admin details
            fetch(`${API_BASE}/${adminId}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Admin not found');
                    }
                    return response.json();
                })
                .then(admin => {
                    document.getElementById('adminDetails').innerHTML = `
                        <p><strong>Username:</strong> ${admin.username}</p>
                        <p><strong>Full Name:</strong> ${admin.fullName || 'Not set'}</p>
                        <p><strong>Email:</strong> ${admin.email}</p>
                        <p><strong>Role:</strong> ${admin.role}</p>
                        <p><strong>Has Profile Photo:</strong> ${admin.profilePhoto ? 'Yes (Base64 stored)' : 'No'}</p>
                    `;
                    showMessage('Admin loaded successfully', 'success');
                    loadProfilePhoto();
                })
                .catch(error => {
                    showMessage('Error loading admin: ' + error.message, 'error');
                    document.getElementById('adminDetails').innerHTML = '';
                });
        }

        function loadProfilePhoto() {
            if (!currentAdminId) {
                showMessage('Please load an admin first', 'error');
                return;
            }

            fetch(`${API_BASE}/${currentAdminId}/profile-photo`)
                .then(response => response.json())
                .then(data => {
                    if (data.hasPhoto && data.photoData) {
                        // Use the Base64 data directly
                        document.getElementById('profilePhoto').src = data.photoData;
                        console.log('Loaded photo from Base64 data');
                        showMessage('Photo loaded successfully', 'success');
                    } else {
                        document.getElementById('profilePhoto').src = 'https://via.placeholder.com/150';
                        console.log('No profile photo found');
                    }
                })
                .catch(error => {
                    console.log('Error loading profile photo:', error.message);
                    document.getElementById('profilePhoto').src = 'https://via.placeholder.com/150';
                    showMessage('Error loading photo: ' + error.message, 'error');
                });
        }

        function uploadPhoto() {
            if (!currentAdminId) {
                showMessage('Please load an admin first', 'error');
                return;
            }

            const fileInput = document.getElementById('photoInput');
            const file = fileInput.files[0];

            if (!file) {
                showMessage('Please select a file first', 'error');
                return;
            }

            // Validate file type
            if (!file.type.startsWith('image/')) {
                showMessage('Please select an image file', 'error');
                return;
            }

            // Validate file size (5MB for Base64)
            if (file.size > 5 * 1024 * 1024) {
                showMessage('File size must be less than 5MB', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('photo', file);

            showMessage('Uploading photo...', 'success');

            fetch(`${API_BASE}/${currentAdminId}/profile-photo`, {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        showMessage(data.error, 'error');
                    } else {
                        showMessage(data.message, 'success');
                        setTimeout(() => {
                            loadProfilePhoto(); // Reload the photo after a short delay
                            loadAdminInfo(); // Refresh admin info
                        }, 500);
                        fileInput.value = ''; // Clear the input
                    }
                })
                .catch(error => {
                    showMessage('Upload failed: ' + error.message, 'error');
                });
        }

        function deletePhoto() {
            if (!currentAdminId) {
                showMessage('Please load an admin first', 'error');
                return;
            }

            if (!confirm('Are you sure you want to delete the profile photo?')) {
                return;
            }

            fetch(`${API_BASE}/${currentAdminId}/profile-photo`, {
                method: 'DELETE'
            })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        showMessage(data.error, 'error');
                    } else {
                        showMessage(data.message, 'success');
                        document.getElementById('profilePhoto').src = 'https://via.placeholder.com/150';
                        loadAdminInfo(); // Refresh admin info
                    }
                })
                .catch(error => {
                    showMessage('Delete failed: ' + error.message, 'error');
                });
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;

            // Clear message after 5 seconds
            setTimeout(() => {
                messageDiv.textContent = '';
                messageDiv.className = '';
            }, 5000);
        }
    </script>
</body>

</html>
