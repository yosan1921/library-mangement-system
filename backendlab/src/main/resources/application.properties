# =============================================================================
# Library Management System (LMS) - Application Configuration
# =============================================================================
# This file contains all configuration properties for the LMS Spring Boot application.
# Properties can be overridden by environment variables or command line arguments.

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
# Port on which the embedded Tomcat server will run
# Default Spring Boot port is 8080, using 8081 to avoid conflicts
server.port=8080

# =============================================================================
# DATABASE CONFIGURATION - MongoDB Atlas Cloud Database
# =============================================================================
# MongoDB connection URI with Atlas cloud cluster
# Includes connection parameters for reliability and performance:
# - retryWrites=true: Enables automatic retry of write operations
# - w=majority: Ensures writes are acknowledged by majority of replica set members
# - connectTimeoutMS=10000: 10 second timeout for initial connection
# - socketTimeoutMS=10000: 10 second timeout for socket operations
# - serverSelectionTimeoutMS=10000: 10 second timeout for server selection
# - maxIdleTimeMS=10000: Close connections idle for more than 10 seconds
spring.data.mongodb.uri=mongodb+srv://yo2_n:yosan1234@cluster0.fpahdmc.mongodb.net/lms?retryWrites=true&w=majority&connectTimeoutMS=10000&socketTimeoutMS=10000&serverSelectionTimeoutMS=10000&maxIdleTimeMS=10000

# Application name displayed in Spring Boot actuator and logs
spring.application.name=Library Management System

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
# Replaces logback-spring.xml with property-based logging configuration
# Root logging level - controls overall application log verbosity
logging.level.root=INFO

# MongoDB driver logging - reduced to ERROR to minimize noise
# These drivers can be very verbose, so we only log errors
logging.level.org.mongodb.driver.cluster=ERROR
logging.level.org.mongodb.driver.connection=ERROR

# Spring Data MongoDB logging - INFO level for database operation insights
logging.level.org.springframework.data.mongodb=INFO

# =============================================================================
# MONGODB SPECIFIC SETTINGS
# =============================================================================
# Automatically create database indexes based on @Indexed annotations
# This ensures optimal query performance for frequently accessed fields
spring.data.mongodb.auto-index-creation=true

# =============================================================================
# EMAIL NOTIFICATION CONFIGURATION
# =============================================================================
# Default email settings for library notifications (overdue books, reservations, etc.)
# These can be overridden by SystemSettings entity for runtime configuration
# Using Gmail SMTP server with TLS encryption

# Gmail SMTP server configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# Email credentials (should be replaced with actual values or environment variables)
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password

# SMTP authentication and security settings
spring.mail.properties.mail.smtp.auth=true          # Enable SMTP authentication
spring.mail.properties.mail.smtp.starttls.enable=true    # Enable STARTTLS encryption
spring.mail.properties.mail.smtp.starttls.required=true  # Require STARTTLS for security

# =============================================================================
# FILE UPLOAD CONFIGURATION
# =============================================================================
# Maximum file size for individual uploads (5MB for Base64 profile photos)
spring.servlet.multipart.max-file-size=5MB
# Maximum total request size (5MB)
spring.servlet.multipart.max-request-size=5MB
# Enable multipart file uploads
spring.servlet.multipart.enabled=true